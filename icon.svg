<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!-- Dark themed grid background -->
    <rect width="512" height="512" fill="#0c0b1e" rx="128"/>
    <!-- Neon grid line patterns -->
    <line x1="128" y1="0" x2="128" y2="512" stroke="#1e1b4b" stroke-width="4"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#1e1b4b" stroke-width="4"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#1e1b4b" stroke-width="4"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#1e1b4b" stroke-width="4"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#1e1b4b" stroke-width="4"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#1e1b4b" stroke-width="4"/>
    
    <!-- Glowing outline aura -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="#f43f5e" stroke-width="12" opacity="0.3" filter="blur(8px)"/>
    
    <!-- Bouncer character body (Rose color) -->
    <circle cx="256" cy="256" r="150" fill="#f43f5e" stroke="#ffffff" stroke-width="10"/>
    
    <!-- Vector eyes -->
    <circle cx="206" cy="216" r="32" fill="#ffffff" />
    <circle cx="206" cy="216" r="14" fill="#000000" />
    <circle cx="306" cy="216" r="32" fill="#ffffff" />
    <circle cx="306" cy="216" r="14" fill="#000000" />
    
    <!-- Cute smile -->
    <path d="M196 296 Q256 356 316 296" stroke="#000000" stroke-width="15" fill="none" stroke-linecap="round" />
</svg>
